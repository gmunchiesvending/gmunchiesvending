<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You For Your Inquiry</title>
<style>
@media only screen and (max-width: 620px) {
  .email-wrap {
    width: 100% !important;
  }

  .email-container {
    width: 100% !important;
    max-width: 100% !important;
    border-radius: 0 !important;
  }

  .pad-lg {
    padding-left: 18px !important;
    padding-right: 18px !important;
  }

  .pad-top {
    padding-top: 22px !important;
  }

  .title-text {
    font-size: 22px !important;
    line-height: 1.25 !important;
  }

  .body-text {
    font-size: 15px !important;
    line-height: 1.5 !important;
  }

  .info-label,
  .info-value {
    display: block !important;
    width: 100% !important;
    padding: 4px 0 !important;
  }
}
</style>
</head>

<body style="margin:0;padding:0;background:#FCE9D4;font-family:Arial,Helvetica,sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" style="background:#FCE9D4;padding:30px 0;" class="email-wrap">
<tr>
<td align="center">

<table width="100%" cellpadding="0" cellspacing="0" class="email-container" style="background:#ffffff;border-radius:8px;overflow:hidden;max-width:600px;">

<!-- HEADER -->
<tr>
<td align="center" style="background:#ffffff;padding:28px 25px 20px 25px;border-bottom:1px solid #f2eee8;" class="pad-lg">
<img src="https://gmunchiesvending.com/branding/mascot.svg" width="120" alt="GMunchies Mascot" style="display:block;">
</td>
</tr>

<!-- INTRO -->
<tr>
<td style="padding:30px 40px 15px 40px;text-align:left;" class="pad-lg pad-top">
<h2 style="margin:0 0 12px 0;color:#232121;font-size:25px;line-height:1.3;" class="title-text">
Hello {{name}},
</h2>
<p style="margin:0 0 10px 0;color:#3d3835;font-size:16px;line-height:1.6;" class="body-text">
Thank you for your interest in our vending services.
</p>
<p style="margin:0;color:#3d3835;font-size:16px;line-height:1.6;" class="body-text">
We will get back to you soon.
</p>
</td>
</tr>

<!-- CLIENT MESSAGE -->
<tr>
<td style="padding:0 40px 20px 40px;" class="pad-lg">
<p style="margin:0 0 8px 0;color:#232121;font-size:15px;font-weight:700;">
Your message:
</p>
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f8f8f8;border-left:4px solid #d7d2cb;border-radius:4px;">
<tr>
<td style="padding:14px 16px;color:#7f7670;font-style:italic;font-size:15px;line-height:1.6;">
"{{description}}"
</td>
</tr>
</table>
</td>
</tr>

<!-- CLIENT INFO -->
<tr>
<td style="padding:8px 40px 20px 40px;" class="pad-lg">
<p style="margin:0 0 10px 0;color:#232121;font-size:15px;font-weight:700;">
Your info:
</p>
<table width="100%" cellpadding="0" cellspacing="0">
<tr>
<td style="padding:7px 0;color:#90857B;font-size:15px;" class="info-label">👤 Name</td>
<td style="padding:7px 0;color:#232121;font-size:15px;" class="info-value"><strong>{{name}}</strong></td>
</tr>
<tr>
<td style="padding:7px 0;color:#90857B;font-size:15px;" class="info-label">✉️ Email</td>
<td style="padding:7px 0;color:#232121;font-size:15px;" class="info-value"><strong>{{email}}</strong></td>
</tr>
<tr>
<td style="padding:7px 0;color:#90857B;font-size:15px;" class="info-label">📞 Phone</td>
<td style="padding:7px 0;color:#232121;font-size:15px;" class="info-value"><strong>{{phone}}</strong></td>
</tr>
<tr>
<td style="padding:7px 0;color:#90857B;font-size:15px;" class="info-label">📍 Location</td>
<td style="padding:7px 0;color:#232121;font-size:15px;" class="info-value"><strong>{{locations}}</strong></td>
</tr>
<tr>
<td style="padding:7px 0;color:#90857B;font-size:15px;" class="info-label">🛠️ Service</td>
<td style="padding:7px 0;color:#232121;font-size:15px;" class="info-value"><strong>{{service}}</strong></td>
</tr>
</table>
</td>
</tr>

<!-- FOOTER -->
<tr>
<td style="background:#232121;color:#ffffff;padding:24px 40px;text-align:center;" class="pad-lg">
<p style="margin:0 0 12px 0;font-size:14px;line-height:1.6;">
GMunchies Vending Team
</p>
<table align="center" cellpadding="0" cellspacing="0">
<tr>
<td style="padding:0 8px;">
<a href="https://www.instagram.com" target="_blank" style="text-decoration:none;">
<img src="https://cdn.simpleicons.org/instagram/FFFFFF" width="22" height="22" alt="Instagram" style="display:block;">
</a>
</td>
<td style="padding:0 8px;">
<a href="https://www.facebook.com" target="_blank" style="text-decoration:none;">
<img src="https://cdn.simpleicons.org/facebook/FFFFFF" width="22" height="22" alt="Facebook" style="display:block;">
</a>
</td>
<td style="padding:0 8px;">
<a href="https://www.linkedin.com" target="_blank" style="text-decoration:none;">
<img src="https://cdn.simpleicons.org/linkedin/FFFFFF" width="22" height="22" alt="LinkedIn" style="display:block;">
</a>
</td>
</tr>
</table>
</td>
</tr>

</table>

</td>
</tr>
</table>

</body>
</html>
